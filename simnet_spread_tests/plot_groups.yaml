# Plot groups — defines which configs belong to which group on the chart.
# This is independent of the run config: you can plot re-grouped slices of the
# same data without re-running anything.
#
# Each group maps to a connected line in the Anonymity vs Stretch scatter.
# Each entry is [p_i, f_i, p_e, f_e] and must match exactly a config that was
# run (same float precision).
#
# Copy-paste from sweep_config.yaml's "groups" section, or hand-pick.

